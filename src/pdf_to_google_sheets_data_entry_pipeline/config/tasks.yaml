---
read_pdf_table:
  description: Return the pre-extracted PDF table JSON from {pdf_extraction_json}
    exactly as-is. Do not modify, summarize, or flatten the data.
  expected_output: A JSON object with a "tables" array. Each table has "headers" (column
    names) and "rows" (array of arrays with all cell values including empty strings
    for empty cells).
  agent: pdf_reader_agent
extract_structured_data:
  description: |-
    Take the structured table JSON from the PDF extraction. Use the first table found (tables[0]). The headers and rows are already correctly structured with empty cells preserved.

    Simply return the data as-is in this format:
    {
      "headers": [...],  // exact column names from the table
      "rows": [...]      // each row as an array, empty cells as ""
    }

    Do NOT reorder, rename, infer, or modify any values. Do NOT use balance logic. The data is already correct — just pass it through.
  expected_output: A JSON object with "headers" and "rows" exactly as extracted from
    the PDF table. Empty cells preserved as "". No modifications.
  agent: data_extraction_agent
  context:
  - read_pdf_table
validate_extracted_records:
  description: Review the extracted table JSON (with "headers" and "rows" keys) and
    pass it through as-is. Do NOT add any extra columns like ValidationStatus or ValidationNotes.
    Simply return the same structure with "headers" and "rows". Just verify the data
    looks complete and correct. If a value is missing, leave it as empty string "".
  expected_output: The same headers+rows JSON structure from extraction, clean and
    ready to write to Google Sheets. No extra columns added. No ValidationStatus or
    ValidationNotes.
  agent: data_validation_agent
  context:
  - extract_structured_data
write_data_to_google_sheets:
  description: |-
    Write the validated table into Google Sheets.
    - Spreadsheet ID: 1c817KZBx1psqhD-TjPE601hytzQW8rO6bhAlDQxPRus
    - Sheet: Sheet1

    Steps (in this exact order):
    1. Use the get_values tool to read the current sheet content
    2. Clear all existing content from Sheet1 first
    3. Write the "headers" row as Row 1: ["Date", "Description", "Ref", "Details", "Debit Amt", "Credit Amt", "Balance"]
    4. Then append each row from "rows" one by one below the header

    The final sheet must have headers on Row 1 and data starting from Row 2. Do NOT append headers after data.
  expected_output: Confirmation that the sheet was cleared, headers written to Row
    1, and all data rows written below. Total rows inserted = 1 header + N data rows.
  agent: google_sheets_writer_agent
  context:
  - validate_extracted_records
generate_processing_report:
  description: |-
    Compile a final processing report based ONLY on the context from previous tasks. Do NOT read the PDF again. Use the data from the Google Sheets write confirmation.

    Report must include:
    - document_name: {pdf_file_path}
    - status: "success" or "failure"
    - records_extracted: total rows written
    - rows_inserted: total rows written
    - errors: any errors encountered
  expected_output: A clean JSON processing report with status, document_name, records_extracted,
    rows_inserted, and errors.
  agent: reporting_agent
  context:
  - write_data_to_google_sheets
